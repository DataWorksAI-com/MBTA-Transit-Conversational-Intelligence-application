# ============================================================
# Boston Weather Agent — HTTP A2A only (no SLIM)
# Image: willdaly/weather-agent compatible; built via docker/Dockerfile.weather-agent
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-agent
  namespace: mbta
  labels:
    app: weather-agent
    app.kubernetes.io/part-of: mbta-winter-2026
    agent-type: a2a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-agent
  template:
    metadata:
      labels:
        app: weather-agent
    spec:
      containers:
        - name: weather-http
          image: ${DOCKER_REGISTRY}/mbta-weather-agent:latest
          ports:
            - containerPort: 8004
              name: http
          envFrom:
            - configMapRef:
                name: mbta-config
          env:
            - name: REGISTRY_URL
              value: "http://registry:6900"
            - name: AGENT_PUBLIC_URL
              value: "http://weather-agent:8004"
            - name: WEATHER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mbta-api-secrets
                  key: WEATHER_API_KEY
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: weather-agent
  namespace: mbta
  labels:
    app: weather-agent
    app.kubernetes.io/part-of: mbta-winter-2026
spec:
  selector:
    app: weather-agent
  ports:
    - port: 8004
      targetPort: 8004
      protocol: TCP
      name: http
  type: ClusterIP
